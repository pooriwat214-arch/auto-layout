<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>AUTO LAYOUT – Production</title>

<script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.min.js"></script>
<script src="https://unpkg.com/konva@9/konva.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --navy:#0b1d3a;
  --panel:#3f4348;
  --bg:#eceff4;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Segoe UI",Arial,sans-serif;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  height:100vh;
}
.topbar{
  background:var(--navy);
  color:white;
  padding:14px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.status-badge{
  background:#1abc9c;
  padding:4px 12px;
  border-radius:999px;
  font-size:12px;
}
.main{
  flex:1;
  min-height:0;
  display:flex;
  overflow:hidden;
}
#controls{
  width:240px;
  background:var(--panel);
  color:#fff;
  border-right:1px solid #d9e0ea;
  padding:14px;
  overflow-y:auto;
}
#controls label{
  display:block;
  margin-bottom:6px;
  color:#f2f4f7;
}
input{
  width:100%;
  padding:7px;
  margin-bottom:10px;
  border:1px solid #d0d7e2;
  border-radius:4px;
}
button{
  width:100%;
  padding:9px;
  margin-bottom:8px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-size:16px;
}
.btn-primary{background:#24469d;color:white;}
.btn-secondary{background:#e7ebee;color:#1f2937;}
#workspace{
  flex:1;
  min-width:0;
  overflow:auto;
  padding:0;
}
.canvas-wrapper{
  background:white;
  padding:0;
  border-radius:0;
  box-shadow:none;
  display:inline-block;
}
.editor-wrapper{
  display:grid;
  grid-template-columns:30px 1fr;
  grid-template-rows:30px 1fr;
}
.ruler-corner{grid-column:1;grid-row:1;background:#2b2b2b;}
#ruler-top{grid-column:2;grid-row:1;background:#2b2b2b;display:block;}
#ruler-left{grid-column:1;grid-row:2;background:#2b2b2b;display:block;}
#container{grid-column:2;grid-row:2;}
.footer-info{
  font-size:12px;
  margin-top:12px;
  color:#e5e7eb;
  line-height:1.35;
}
</style>
</head>

<body>

<div class="topbar">
  <div><strong>AUTO LAYOUT</strong> – Production System</div>
  <div class="status-badge" id="systemStatus">READY</div>
</div>

<div class="main">
  <div id="controls">
    <label>Carpet Width (m)</label>
    <input type="number" id="width" value="4">

    <label>Carpet Length (m)</label>
    <input type="number" id="length" value="40">

    <label>Gap (cm)</label>
    <input type="number" id="gap" value="10">

    <label>Upload Images</label>
    <input type="file" id="upload" multiple>

    <button class="btn-primary" onclick="autoLayout()">Smart Auto Layout</button>
    <button class="btn-primary" onclick="exportPDF()">Export Production PDF</button>
    <button class="btn-secondary" onclick="initStage()">Reset Project</button>

    <div class="footer-info">
      Images: <span id="imageCount">0</span><br>
      Used Area: <span id="usedArea">0%</span><br>
      Carpet Size: <span id="carpetSize">0 x 0 cm</span>
    </div>
  </div>

  <div id="workspace">
    <div class="canvas-wrapper">
      <div class="editor-wrapper">
        <div class="ruler-corner"></div>
        <canvas id="ruler-top"></canvas>
        <canvas id="ruler-left"></canvas>
        <div id="container"></div>
      </div>
    </div>
  </div>
</div>

<script>
let stage, layer;
let SCALE = 1;

window.addEventListener("load", initStage);
window.addEventListener("resize", initStage);
  
const rulerTop = document.getElementById("ruler-top");
const rulerLeft = document.getElementById("ruler-left");
const ctxTop = rulerTop.getContext("2d");
const ctxLeft = rulerLeft.getContext("2d");

function initRulers(){

  const rulerTop = document.getElementById("ruler-top");
  const rulerLeft = document.getElementById("ruler-left");

  rulerTop.width = stage.width();
  rulerTop.height = 30;

  rulerLeft.width = 30;
  rulerLeft.height = stage.height();

  const ctxTop = rulerTop.getContext("2d");
  const ctxLeft = rulerLeft.getContext("2d");

  ctxTop.fillStyle = "#2b2b2b";
  ctxTop.fillRect(0,0,rulerTop.width,30);

  ctxLeft.fillStyle = "#2b2b2b";
  ctxLeft.fillRect(0,0,30,rulerLeft.height);

  ctxTop.strokeStyle = "#aaa";
  ctxLeft.strokeStyle = "#aaa";

  ctxTop.fillStyle = "#fff";
  ctxLeft.fillStyle = "#fff";

  ctxTop.font = "10px Arial";
  ctxLeft.font = "10px Arial";

  const effectiveScale = SCALE;

  for(let i=0; i<rulerTop.width/effectiveScale; i++){

    const x = i * effectiveScale;

    let tick = 5;
    if(i % 10 === 0) tick = 15;
    else if(i % 5 === 0) tick = 10;

    ctxTop.beginPath();
    ctxTop.moveTo(x,30);
    ctxTop.lineTo(x,30-tick);
    ctxTop.stroke();

    if(i % 10 === 0){
      ctxTop.fillText(i, x+2, 10);
    }
  }

  for(let i=0; i<rulerLeft.height/effectiveScale; i++){

    const y = i * effectiveScale;

    let tick = 5;
    if(i % 10 === 0) tick = 15;
    else if(i % 5 === 0) tick = 10;

    ctxLeft.beginPath();
    ctxLeft.moveTo(30,y);
    ctxLeft.lineTo(30-tick,y);
    ctxLeft.stroke();

    if(i % 10 === 0){
      ctxLeft.save();
      ctxLeft.translate(2,y+3);
      ctxLeft.rotate(-Math.PI/2);
      ctxLeft.fillText(i,0,0);
      ctxLeft.restore();
    }
  }
}

function drawRulers(){

  ctxTop.clearRect(0,0,rulerTop.width,rulerTop.height);
  ctxLeft.clearRect(0,0,rulerLeft.width,rulerLeft.height);

  ctxTop.fillStyle = "#2b2b2b";
  ctxTop.fillRect(0,0,rulerTop.width,rulerTop.height);

  ctxLeft.fillStyle = "#2b2b2b";
  ctxLeft.fillRect(0,0,rulerLeft.width,rulerLeft.height);

  ctxTop.strokeStyle = "#aaa";
  ctxLeft.strokeStyle = "#aaa";

  ctxTop.fillStyle = "#fff";
  ctxLeft.fillStyle = "#fff";

  ctxTop.font = "10px Arial";
  ctxLeft.font = "10px Arial";

  for(let i=0; i<rulerTop.width/SCALE; i++){
    const x = i * SCALE;
    let tickHeight = 5;

    if(i % 10 === 0) tickHeight = 15;
    else if(i % 5 === 0) tickHeight = 10;

    ctxTop.beginPath();
    ctxTop.moveTo(x,30);
    ctxTop.lineTo(x,30-tickHeight);
    ctxTop.stroke();

    if(i % 10 === 0){
      ctxTop.fillText(i, x+2, 10);
    }
  }

  for(let i=0; i<rulerLeft.height/SCALE; i++){
    const y = i * SCALE;
    let tickWidth = 5;

    if(i % 10 === 0) tickWidth = 15;
    else if(i % 5 === 0) tickWidth = 10;

    ctxLeft.beginPath();
    ctxLeft.moveTo(30, y);
    ctxLeft.lineTo(30-tickWidth, y);
    ctxLeft.stroke();

    if(i % 10 === 0){
      ctxLeft.save();
      ctxLeft.translate(2, y+3);
      ctxLeft.rotate(-Math.PI/2);
      ctxLeft.fillText(i, 0, 0);
      ctxLeft.restore();
    }
  }
}

/* ================= RESPONSIVE SCALE ================= */

function getResponsiveScale(){

  const widthCm = parseFloat(document.getElementById("width").value) * 100;
  const workspace = document.getElementById("workspace");

  const maxWidth = workspace.clientWidth - 100;

  return maxWidth / widthCm;
}

/* ================= INIT STAGE ================= */

function initStage(){

  const widthCm = parseFloat(document.getElementById("width").value) * 100;
  const lengthCm = parseFloat(document.getElementById("length").value) * 100;

  SCALE = getResponsiveScale();

  const widthPx = widthCm * SCALE;
  const heightPx = lengthCm * SCALE;

  const container = document.getElementById("container");
  container.innerHTML = "";

  stage = new Konva.Stage({
    container: "container",
    width: widthPx,
    height: heightPx
  });

  layer = new Konva.Layer();
  stage.add(layer);

  const carpet = new Konva.Rect({
    x: 0,
    y: 0,
    width: widthPx,
    height: heightPx,
    fill: "#ffffff",
    stroke: "black",
    strokeWidth: 2
  });

  layer.add(carpet);
  layer.draw();

  initRulers();
  updateAreaUsage();
}

/* ================= UPLOAD TIFF ================= */

document.getElementById("upload").addEventListener("change", function(e){

  Array.from(e.target.files).forEach(file=>{

    const reader = new FileReader();

    reader.onload = function(evt){

      const buffer = evt.target.result;
      const ifds = UTIF.decode(buffer);
      const page = ifds[0];

      UTIF.decodeImage(buffer, page);

      const widthPx = page.width;
      const heightPx = page.height;

      const rgba = UTIF.toRGBA8(page);

      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = widthPx;
      tempCanvas.height = heightPx;

      const ctx = tempCanvas.getContext("2d");
      const imgData = ctx.createImageData(widthPx, heightPx);
      imgData.data.set(rgba);
      ctx.putImageData(imgData, 0, 0);

      const imgObj = new Image();

    imgObj.onload = function(){

  // ===== อ่าน DPI =====
  let dpiX = 300;
  let dpiY = 300;

  if(page["XResolution"] && page["YResolution"]){
    dpiX = page["XResolution"][0] / page["XResolution"][1];
    dpiY = page["YResolution"][0] / page["YResolution"][1];
  }

  // ===== แปลง pixel → cm =====
  const widthCm = (widthPx / dpiX) * 2.54;
  const heightCm = (heightPx / dpiY) * 2.54;

  // ===== cm → canvas pixel =====
  const displayWidth = widthCm * SCALE;
  const displayHeight = heightCm * SCALE;

  const img = new Konva.Image({
    image: imgObj,
    x: 0,
    y: 0,
    width: displayWidth,
    height: displayHeight,
    draggable: true
  });

  // เก็บขนาดจริงไว้กับ object
  img.realWidthCm = widthCm;
  img.realHeightCm = heightCm;

  layer.add(img);
  layer.draw();

  updateImageCount();
  updateAreaUsage();
};
      imgObj.src = tempCanvas.toDataURL();
    };

    reader.readAsArrayBuffer(file);
  });
});

/* ================= FUNCTIONS ================= */

function updateImageCount(){
  const images = layer.children.filter(n => n.className === "Image");
  document.getElementById("imageCount").innerText = images.length;
}

function autoLayout(){

  const gapCm = parseFloat(document.getElementById("gap").value);
  const gapPx = gapCm * SCALE;

  let x = 0, y = 0, rowHeight = 0;

  const images = layer.children
    .filter(n => n.className === "Image")
    .sort((a,b)=>(b.width()*b.height())-(a.width()*a.height()));

  images.forEach(img => {

    if(x + img.width() > stage.width()){
      x = 0;
      y += rowHeight + gapPx;
      rowHeight = 0;
    }

    img.position({x,y});
    x += img.width() + gapPx;
    rowHeight = Math.max(rowHeight, img.height());
  });

  layer.draw();
  updateAreaUsage();
}

function exportPDF(){
  if(!stage) return;

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({
    orientation: stage.width() >= stage.height() ? "landscape" : "portrait",
    unit: "pt",
    format: [stage.width(), stage.height()]
  });

  const imageData = stage.toDataURL({ pixelRatio: 2 });
  pdf.addImage(imageData, "PNG", 0, 0, stage.width(), stage.height());
  pdf.save("auto-layout-production.pdf");
}

function updateAreaUsage(){

  const widthCm = parseFloat(document.getElementById("width").value) * 100;
  const lengthCm = parseFloat(document.getElementById("length").value) * 100;
  const carpetArea = widthCm * lengthCm;

  let used = 0;

  layer.children.forEach(n=>{
    if(n.className === "Image"){
      used += n.realWidthCm * n.realHeightCm;
    }
  });

  document.getElementById("usedArea").innerText =
    ((used/carpetArea)*100).toFixed(2) + "%";

  document.getElementById("carpetSize").innerText =
    widthCm + " x " + lengthCm + " cm";
}
</script>
</body>
</html>
