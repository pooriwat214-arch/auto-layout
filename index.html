<!DOCTYPE html>

<body>

  <div><strong>AUTO LAYOUT</strong> – Production System</div>

</div>

<div class="main">

<div id="controls">

<label>Carpet Width (m)</label>
<input type="number" id="width" value="4">

<label>Carpet Length (m)</label>
<input type="number" id="length" value="40">

<label>Gap (cm)</label>
<input type="number" id="gap" value="10">

<label>Upload Images</label>
<input type="file" id="upload" multiple>

<button class="btn-primary" onclick="autoLayout()">Smart Auto Layout</button>
<button class="btn-primary" onclick="exportPDF()">Export Production PDF</button>

<div class="footer-info">
Images: <span id="imageCount">0</span><br>
Used Area: <span id="usedArea">0%</span><br>
Carpet Size: <span id="carpetSize">0 x 0 cm</span>
</div>

</div>

<div id="workspace">
<div class="canvas-wrapper">
<div id="container"></div>
</div>
</div>

</div>

<script>
const SCALE = 0.1;
let stage, layer;

function initStage(){

  const widthCm = width.value * 100;
  const lengthCm = length.value * 100;

  const widthPx = widthCm * SCALE;
  const heightPx = lengthCm * SCALE;

  container.innerHTML="";

  stage = new Konva.Stage({
    container:'container',
    width:widthPx,
    height:heightPx
  });

  layer = new Konva.Layer();
  stage.add(layer);

  layer.add(new Konva.Rect({
    x:0,y:0,
    width:widthPx,
    height:heightPx,
    stroke:"black",
    strokeWidth:2
  }));

  updateAreaUsage();
}

function initStage(){

  const widthCm = width.value * 100;
  const lengthCm = length.value * 100;

  const widthPx = widthCm * SCALE;
  const heightPx = lengthCm * SCALE;

  container.innerHTML="";

  stage = new Konva.Stage({
    container:'container',
    width:widthPx,
    height:heightPx
  });

  layer = new Konva.Layer();
  stage.add(layer);

  // พื้นพรม
  const carpet = new Konva.Rect({
    x:0,
    y:0,
    width:widthPx,
    height:heightPx,
    fill:"#fdfdfd",
    stroke:"black",
    strokeWidth:2
  });

  layer.add(carpet);
  layer.draw();

  updateAreaUsage();
}

});

function updateImageCount(){
  imageCount.innerText =
    layer.children.filter(n=>n.className==="Image").length;
}

function autoLayout(){

  const gapCm = parseFloat(document.getElementById("gap").value);
  const gapPx = gapCm * SCALE;

  let x=0,y=0,rowHeight=0;

  const images=layer.children
    .filter(n=>n.className==="Image")
    .sort((a,b)=>(b.width()*b.height())-(a.width()*a.height()));

  images.forEach(img=>{

    if(x+img.width()>stage.width()){
      x=0;
      y+=rowHeight+gapPx;
      rowHeight=0;
    }

    img.position({x,y});
    x+=img.width()+gapPx;
    rowHeight=Math.max(rowHeight,img.height());
  });

  layer.draw();
  updateAreaUsage();
}

function updateAreaUsage(){

  const widthCm = width.value*100;
  const lengthCm = length.value*100;
  const carpetArea = widthCm*lengthCm;

  let used=0;

  layer.children.forEach(n=>{
    if(n.className==="Image"){
      const realW = n.width()/SCALE;
      const realH = n.height()/SCALE;
      used+=realW*realH;
    }
  });

  usedArea.innerText=((used/carpetArea)*100).toFixed(2)+"%";
  carpetSize.innerText=widthCm+" x "+lengthCm+" cm";
}

async function exportPDF(){

  const { jsPDF } = window.jspdf;

  const widthCm = width.value*100;
  const lengthCm = length.value*100;

  const scaleDown = 10; // 1:10

  const doc=new jsPDF({
    orientation:"portrait",
    unit:"cm",
    format:[widthCm/scaleDown,lengthCm/scaleDown]
  });

  for(let node of layer.children){

    if(node.className!=="Image") continue;

    doc.addImage(
      node.image().src,
      "JPEG",
      node.x()/SCALE/scaleDown,
      node.y()/SCALE/scaleDown,
      node.width()/SCALE/scaleDown,
      node.height()/SCALE/scaleDown
    );
  }

  doc.save("Production_Layout.pdf");
}
</script>
</body>
</html>
