<style>
:root{
  --navy:#2f3136;
  --panel:#3b3d42;
  --panel-line:#4d5158;
  --bg:#5a5a5a;
  --text-light:#f2f4f7;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Segoe UI",Arial,sans-serif;
  background:#3f3f3f;
  display:flex;
  flex-direction:column;
  height:100vh;
}
.topbar{
  background:var(--navy);
  color:white;
  padding:10px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #222427;
  z-index:2;
}
.brand-title{font-weight:700;letter-spacing:.2px;}
.status-badge{
  background:#1abc9c;
  padding:3px 11px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}
.main{
  flex:1;
  min-height:0;
  display:flex;
  overflow:hidden;
}
#controls{
  width:250px;
  background:linear-gradient(180deg,#41454d 0%, #393d44 100%);
  color:#fff;
  border-right:1px solid var(--panel-line);
  padding:14px;
  overflow-y:auto;
  box-shadow:inset -1px 0 0 rgba(255,255,255,0.04);
}
#controls label{
  display:block;
  margin-bottom:6px;
  color:var(--text-light);
  font-size:14px;
  font-weight:600;
}
input, select{
  width:100%;
  padding:7px 8px;
  margin-bottom:10px;
  border:1px solid #c7ceda;
  border-radius:6px;
  font-size:14px;
}
input:focus, select:focus{
  outline:none;
  border-color:#6ca0ff;
  box-shadow:0 0 0 2px rgba(108,160,255,0.25);
}
input[type="file"]{
  padding:6px;
  color:#f8fafc;
  background:rgba(255,255,255,0.05);
}
button{
  width:100%;
  padding:9px;
  margin-bottom:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
  transition:filter .15s ease;
}
button:hover{filter:brightness(1.05);}
.btn-primary{background:#24469d;color:white;}
.btn-secondary{background:#e7ebee;color:#1f2937;}
#workspace{
  flex:1;
  min-width:0;
  overflow:auto;
  padding:8px;
  display:flex;
  justify-content:flex-start;
  align-items:flex-start;
  background:#5f5f5f;
}
.canvas-wrapper{
  background:#f4f4f4;
  padding:0;
  border-radius:0;
  box-shadow:none;
  display:inline-block;
}
.editor-wrapper{
  display:grid;
  grid-template-columns:30px 1fr;
  grid-template-rows:30px 1fr;
}
.ruler-corner{grid-column:1;grid-row:1;background:#303030;}
#ruler-top{grid-column:2;grid-row:1;background:#303030;display:block;}
#ruler-left{grid-column:1;grid-row:2;background:#303030;display:block;}
#container{grid-column:2;grid-row:2;}
.file-details{
  margin:4px 0 10px;
  padding:8px;
  border:1px solid rgba(255,255,255,0.16);
  border-radius:6px;
  background:rgba(0,0,0,0.15);
  color:#f3f4f6;
  max-height:170px;
  overflow:auto;
  font-size:11px;
}
.file-item{
  padding:6px 0;
  border-bottom:1px dashed rgba(255,255,255,0.18);
}
.file-item:last-child{border-bottom:none;}
.file-name{
  font-weight:600;
  color:#ffffff;
  margin-bottom:2px;
  word-break:break-word;
}
.file-meta{opacity:.88; line-height:1.3;}
.file-status{
  display:inline-block;
  margin-top:3px;
  padding:1px 6px;
  border-radius:999px;
  font-size:10px;
  background:#1f3c88;
}
.file-details.empty{
  opacity:1;
  color:#f9fafb;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:40px;
  font-weight:600;
  background:rgba(255,255,255,0.08);
}
.selected-image-details{
  margin-top:10px;
  padding:8px;
  border:1px solid rgba(255,255,255,0.16);
  border-radius:6px;
  background:rgba(0,0,0,0.18);
  font-size:11px;
  line-height:1.35;
  color:#f3f4f6;
}
.selected-image-title{
  font-weight:700;
  margin-bottom:4px;
  color:#ffffff;
}
.file-details.empty{opacity:.8;}
.footer-info{
  font-size:12px;
  margin-top:12px;
  color:#e5e7eb;
  line-height:1.4;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand-title">AUTO LAYOUT – Production System</div>
  <div class="status-badge" id="systemStatus">READY</div>
</div>

<div class="main">
  <div id="controls">
    <label>Carpet Width (m)</label>
    <input type="number" id="width" value="4">

    <label>Carpet Length (m)</label>
    <input type="number" id="length" value="40">

    <label>Gap (cm)</label>
    <input type="number" id="gap" value="1" min="0" step="1">

    <label>Color Profile</label>
    <select id="colorProfile">
      <option value="RGB" selected>RGB (sRGB IEC61966-2.1)</option>
      <option value="CMYK">CMYK (Coated FOGRA39)</option>
    </select>

    <label>Upload Images</label>
    <input type="file" id="upload" multiple>
    <div id="fileDetails" class="file-details empty">No files selected</div>
    <div id="selectedImageDetails" class="selected-image-details">
      <div class="selected-image-title">Selected Image</div>
      <div>No image selected</div>
    </div>

    <button class="btn-primary" onclick="autoLayout()">Smart Auto Layout</button>
    <button class="btn-primary" onclick="exportPDF()">Export Production PDF</button>
    <button class="btn-secondary" id="gridToggleBtn" onclick="toggleGrid()">Hide Grid</button>
    <button class="btn-secondary" onclick="rotateSelected90()">Rotate 90°</button>
    <button class="btn-secondary" onclick="initStage()">Reset Project</button>

    <div class="footer-info">
      Images: <span id="imageCount">0</span><br>
      Used Area: <span id="usedArea">0%</span><br>
      Carpet Size: <span id="carpetSize">0 x 0 cm</span><br>
      Zoom: <span id="zoomLevel">100%</span><br>
      Profile: <span id="profileInfo">RGB</span>
    </div>
  </div>

  <div id="workspace">
    <div class="canvas-wrapper">
      <div class="editor-wrapper">
        <div class="ruler-corner"></div>
        <canvas id="ruler-top"></canvas>
        <canvas id="ruler-left"></canvas>
        <div id="container"></div>
      </div>
    </div>
  </div>
</div>

<script>
let stage, carpetLayer, gridLayer, imageLayer;
let SCALE = 1;
let isGridVisible = true;
let VIEW_ZOOM = 1;
const MIN_ZOOM = 0.5;
const MAX_ZOOM = 4;

window.addEventListener("load", initStage);
window.addEventListener("resize", initStage);
["width","length","gap","colorProfile"].forEach(id => {
  document.getElementById(id).addEventListener("change", initStage);
});
  
const rulerTop = document.getElementById("ruler-top");
const rulerLeft = document.getElementById("ruler-left");
const ctxTop = rulerTop.getContext("2d");
const ctxLeft = rulerLeft.getContext("2d");
const fileDetailsState = [];
const selectedImages = new Set();
let dragAnchorNode = null;
let dragStartPositions = null;

function formatFileSize(bytes){
  if(bytes < 1024) return `${bytes} B`;
  if(bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
}

function renderFileDetails(){
  const el = document.getElementById("fileDetails");

  if(!fileDetailsState.length){
    el.classList.add("empty");
    el.innerText = "No files selected";
    return;
  }

  el.classList.remove("empty");
  el.innerHTML = fileDetailsState.map(file => `
    <div class="file-item">
      <div class="file-name">${file.name}</div>
      <div class="file-meta">Type: ${file.type}</div>
      <div class="file-meta">Size: ${formatFileSize(file.size)}</div>
      ${file.dimensions ? `<div class="file-meta">Pixel: ${file.dimensions}</div>` : ""}
      ${file.physical ? `<div class="file-meta">Physical: ${file.physical}</div>` : ""}
      ${file.dpi ? `<div class="file-meta">DPI: ${file.dpi}</div>` : ""}
      <div class="file-status">${file.status}</div>
    </div>
  `).join("");
}

function clearSelectedImageDetails(){
  const panel = document.getElementById("selectedImageDetails");
  panel.innerHTML = `
    <div class="selected-image-title">Selected Image</div>
    <div>No image selected</div>
  `;
}

function updateSelectedImageDetails(node){
  const panel = document.getElementById("selectedImageDetails");
  const file = node.fileDetail || {};

  panel.innerHTML = `
    <div class="selected-image-title">Selected Image</div>
    <div><strong>Name:</strong> ${file.name || "-"}</div>
    <div><strong>Pixel:</strong> ${file.dimensions || "-"}</div>
    <div><strong>Physical:</strong> ${file.physical || "-"}</div>
    <div><strong>DPI:</strong> ${file.dpi || "-"}</div>
    <div><strong>Position:</strong> ${Math.round(node.x()/SCALE)} x ${Math.round(node.y()/SCALE)} cm</div>
    <div><strong>Display size:</strong> ${(node.width()/SCALE).toFixed(2)} x ${(node.height()/SCALE).toFixed(2)} cm</div>
    <div><strong>Rotation:</strong> ${Math.round(node.rotation()) % 360}°</div>
  `;
}

function snapToCm(valuePx){
  return Math.round(valuePx / SCALE) * SCALE;
}

function clampPosition(node, x, y){
  const maxX = stage.width() - node.width();
  const maxY = stage.height() - node.height();
  return {
    x: Math.max(0, Math.min(maxX, x)),
    y: Math.max(0, Math.min(maxY, y))
  };
}

function refreshSelectionStyles(){
  if(!imageLayer) return;
  imageLayer.children.forEach(img => {
    if(img.className !== "Image") return;
    const active = selectedImages.has(img);
    img.shadowColor(active ? "#60a5fa" : "transparent");
    img.shadowBlur(active ? 12 : 0);
    img.shadowOpacity(active ? 0.95 : 0);
    img.shadowEnabled(active);
  });
  imageLayer.draw();
}

function attachImageInteractions(img){
  img.on("click tap", function(e){
    e.cancelBubble = true;

    if(e.evt && (e.evt.shiftKey || e.evt.ctrlKey || e.evt.metaKey)){
      if(selectedImages.has(this)) selectedImages.delete(this);
      else selectedImages.add(this);
    }else{
      selectedImages.clear();
      selectedImages.add(this);
    }

    refreshSelectionStyles();
    if(selectedImages.size === 0) clearSelectedImageDetails();
    else updateSelectedImageDetails(this);
  });

  img.on("dragstart", function(){
    if(!selectedImages.has(this)){
      selectedImages.clear();
      selectedImages.add(this);
    }

    dragAnchorNode = this;
    dragStartPositions = new Map();
    selectedImages.forEach(node => {
      dragStartPositions.set(node, { x: node.x(), y: node.y() });
    });

    refreshSelectionStyles();
  });

  img.on("dragmove", function(){
    if(dragAnchorNode !== this || !dragStartPositions || selectedImages.size <= 1) return;

    const start = dragStartPositions.get(this);
    if(!start) return;

    const deltaX = this.x() - start.x;
    const deltaY = this.y() - start.y;

    selectedImages.forEach(node => {
      if(node === this) return;
      const p = dragStartPositions.get(node);
      if(!p) return;

      const next = clampPosition(node, p.x + deltaX, p.y + deltaY);
      node.position(next);
    });

    imageLayer.batchDraw();
  });

  img.on("dragend", function(){
    if(selectedImages.has(this)){
      selectedImages.forEach(node => {
        const snapped = clampPosition(node, snapToCm(node.x()), snapToCm(node.y()));
        node.position(snapped);
      });
    }else{
      const snapped = clampPosition(this, snapToCm(this.x()), snapToCm(this.y()));
      this.position(snapped);
    }

    dragAnchorNode = null;
    dragStartPositions = null;
    imageLayer.draw();
    updateAreaUsage();
    updateSelectedImageDetails(this);
  });
}

function rotateSelected90(){
  if(!imageLayer) return;

  const targets = selectedImages.size ? Array.from(selectedImages) : [];
  if(!targets.length) return;

  targets.forEach(node => {
    node.rotation((node.rotation() + 90) % 360);

    const rect = node.getClientRect({ skipShadow: true });
    let dx = 0;
    let dy = 0;

    if(rect.x < 0) dx = -rect.x;
    if(rect.y < 0) dy = -rect.y;

    if(rect.x + rect.width > stage.width()) dx = stage.width() - (rect.x + rect.width);
    if(rect.y + rect.height > stage.height()) dy = stage.height() - (rect.y + rect.height);

    node.position({
      x: snapToCm(node.x() + dx),
      y: snapToCm(node.y() + dy)
    });
  });

  imageLayer.draw();
  updateAreaUsage();

  const focusNode = targets[targets.length - 1];
  if(focusNode) updateSelectedImageDetails(focusNode);
}

function updateGridToggleButton(){
  const btn = document.getElementById("gridToggleBtn");
  if(btn) btn.innerText = isGridVisible ? "Hide Grid" : "Show Grid";
}

function updateZoomInfo(){
  const zoomEl = document.getElementById("zoomLevel");
  if(zoomEl) zoomEl.innerText = `${(VIEW_ZOOM * 100).toFixed(0)}%`;
}

function getSelectedProfile(){
  return document.getElementById("colorProfile").value;
}

function updateProfileUI(){
  const profile = getSelectedProfile();
  const status = document.getElementById("systemStatus");
  const profileInfo = document.getElementById("profileInfo");
  if(status) status.innerText = `READY • ${profile}`;
  if(profileInfo) profileInfo.innerText = profile;
}

function renderGridOverlay(){
  if(!gridLayer || !stage) return;

  gridLayer.destroyChildren();

  if(!isGridVisible){
    gridLayer.draw();
    return;
  }

  const widthCm = parseFloat(document.getElementById("width").value) * 100;
  const lengthCm = parseFloat(document.getElementById("length").value) * 100;

  for(let xCm = 1; xCm < widthCm; xCm++){
    const x = xCm * SCALE;
    gridLayer.add(new Konva.Line({
      points: [x, 0, x, stage.height()],
      stroke: xCm % 10 === 0 ? "rgba(80,80,80,0.45)" : "rgba(80,80,80,0.22)",
      strokeWidth: xCm % 10 === 0 ? 0.8 : 0.45,
      listening: false
    }));
  }

  for(let yCm = 1; yCm < lengthCm; yCm++){
    const y = yCm * SCALE;
    gridLayer.add(new Konva.Line({
      points: [0, y, stage.width(), y],
      stroke: yCm % 10 === 0 ? "rgba(80,80,80,0.45)" : "rgba(80,80,80,0.22)",
      strokeWidth: yCm % 10 === 0 ? 0.8 : 0.45,
      listening: false
    }));
  }

  gridLayer.draw();
}

function toggleGrid(){
  isGridVisible = !isGridVisible;
  updateGridToggleButton();
  renderGridOverlay();
}

function setupStageInteractions(){
  stage.on("click tap", function(e){
    if(e.target === stage){
      selectedImages.clear();
      refreshSelectionStyles();
      clearSelectedImageDetails();
    }
  });

  stage.on("wheel", function(e){
    e.evt.preventDefault();

    const oldScale = stage.scaleX();
    const pointer = stage.getPointerPosition();
    if(!pointer) return;

    const mousePointTo = {
      x: (pointer.x - stage.x()) / oldScale,
      y: (pointer.y - stage.y()) / oldScale
    };

    const scaleBy = 1.05;
    const direction = e.evt.deltaY > 0 ? -1 : 1;
    const nextScale = direction > 0 ? oldScale * scaleBy : oldScale / scaleBy;
    const newScale = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, nextScale));

    stage.scale({ x: newScale, y: newScale });
    VIEW_ZOOM = newScale;

    const newPos = {
      x: pointer.x - mousePointTo.x * newScale,
      y: pointer.y - mousePointTo.y * newScale
    };

    stage.position(newPos);
    stage.batchDraw();
    drawRulers();
    updateZoomInfo();
  });
}

function initRulers(){
  rulerTop.width = stage.width();
  rulerTop.height = 30;

  rulerLeft.width = 30;
  rulerLeft.height = stage.height();

  drawRulers();
}

function drawRulers(){

  ctxTop.clearRect(0,0,rulerTop.width,rulerTop.height);
  ctxLeft.clearRect(0,0,rulerLeft.width,rulerLeft.height);

  ctxTop.fillStyle = "#2b2b2b";
  ctxTop.fillRect(0,0,rulerTop.width,rulerTop.height);

  ctxLeft.fillStyle = "#2b2b2b";
  ctxLeft.fillRect(0,0,rulerLeft.width,rulerLeft.height);

  ctxTop.strokeStyle = "#aaa";
  ctxLeft.strokeStyle = "#aaa";

  ctxTop.fillStyle = "#fff";
  ctxLeft.fillStyle = "#fff";

  ctxTop.font = "10px Arial";
  ctxLeft.font = "10px Arial";

  const widthCm = parseFloat(document.getElementById("width").value) * 100;
  const lengthCm = parseFloat(document.getElementById("length").value) * 100;
  const zoom = stage ? stage.scaleX() : 1;
  const offsetX = stage ? stage.x() : 0;
  const offsetY = stage ? stage.y() : 0;

  for(let i=0; i<=widthCm; i++){
    const x = offsetX + (i * SCALE * zoom);
    if(x < 0 || x > rulerTop.width) continue;

    let tickHeight = 5;
    if(i % 10 === 0) tickHeight = 15;
    else if(i % 5 === 0) tickHeight = 10;

    ctxTop.beginPath();
    ctxTop.moveTo(x,30);
    ctxTop.lineTo(x,30-tickHeight);
    ctxTop.stroke();

    if(i % 10 === 0){
      ctxTop.fillText(i, x+2, 10);
    }
  }

  for(let i=0; i<=lengthCm; i++){
    const y = offsetY + (i * SCALE * zoom);
    if(y < 0 || y > rulerLeft.height) continue;

    let tickWidth = 5;
    if(i % 10 === 0) tickWidth = 15;
    else if(i % 5 === 0) tickWidth = 10;

    ctxLeft.beginPath();
    ctxLeft.moveTo(30, y);
    ctxLeft.lineTo(30-tickWidth, y);
    ctxLeft.stroke();

    if(i % 10 === 0){
      ctxLeft.save();
      ctxLeft.translate(2, y+3);
      ctxLeft.rotate(-Math.PI/2);
      ctxLeft.fillText(i, 0, 0);
      ctxLeft.restore();
    }
  }
}

/* ================= RESPONSIVE SCALE ================= */

function getResponsiveScale(){

  const widthCm = parseFloat(document.getElementById("width").value) * 100;
  const lengthCm = parseFloat(document.getElementById("length").value) * 100;
  const workspace = document.getElementById("workspace");

  const availableWidth = Math.max(120, workspace.clientWidth - 46);

  return Math.max(0.1, availableWidth / widthCm);
}

/* ================= INIT STAGE ================= */

function initStage(){

  const widthCm = parseFloat(document.getElementById("width").value) * 100;
  const lengthCm = parseFloat(document.getElementById("length").value) * 100;

  SCALE = getResponsiveScale();

  const widthPx = widthCm * SCALE;
  const heightPx = lengthCm * SCALE;

  const container = document.getElementById("container");
  container.innerHTML = "";
  selectedImages.clear();
  dragAnchorNode = null;
  dragStartPositions = null;
  clearSelectedImageDetails();

  stage = new Konva.Stage({
    container: "container",
    width: widthPx,
    height: heightPx
  });

  VIEW_ZOOM = 1;
  stage.scale({ x: 1, y: 1 });
  stage.position({ x: 0, y: 0 });

  carpetLayer = new Konva.Layer();
  gridLayer = new Konva.Layer();
  imageLayer = new Konva.Layer();
  stage.add(carpetLayer);
  stage.add(gridLayer);
  stage.add(imageLayer);

  const profile = getSelectedProfile();
  const carpetFill = profile === "CMYK" ? "#f8f8f4" : "#ffffff";

  const carpet = new Konva.Rect({
    x: 0,
    y: 0,
    width: widthPx,
    height: heightPx,
    fill: carpetFill,
    stroke: "black",
    strokeWidth: 2
  });

  carpetLayer.add(carpet);
  carpetLayer.draw();

  renderGridOverlay();
  setupStageInteractions();
  initRulers();
  updateGridToggleButton();
  updateZoomInfo();
  updateProfileUI();
  updateAreaUsage();
}

/* ================= UPLOAD TIFF ================= */

document.getElementById("upload").addEventListener("change", function(e){

  const selectedFiles = Array.from(e.target.files);
  fileDetailsState.length = 0;

  if(!selectedFiles.length){
    renderFileDetails();
    return;
  }

  selectedFiles.forEach(file=>{

    const detail = {
      name: file.name,
      type: file.type || "unknown",
      size: file.size,
      status: "Loading..."
    };

    fileDetailsState.push(detail);
    renderFileDetails();

    const reader = new FileReader();

    reader.onload = function(evt){
      try{
        const buffer = evt.target.result;
        const ifds = UTIF.decode(buffer);
        const page = ifds[0];

        UTIF.decodeImage(buffer, page);

        const widthPx = page.width;
        const heightPx = page.height;
        const rgba = UTIF.toRGBA8(page);

        const tempCanvas = document.createElement("canvas");
        tempCanvas.width = widthPx;
        tempCanvas.height = heightPx;

        const ctx = tempCanvas.getContext("2d");
        const imgData = ctx.createImageData(widthPx, heightPx);
        imgData.data.set(rgba);
        ctx.putImageData(imgData, 0, 0);

        const imgObj = new Image();

        imgObj.onload = function(){
          let dpiX = 300;
          let dpiY = 300;

          if(page["XResolution"] && page["YResolution"]){
            dpiX = page["XResolution"][0] / page["XResolution"][1];
            dpiY = page["YResolution"][0] / page["YResolution"][1];
          }

          const widthCm = (widthPx / dpiX) * 2.54;
          const heightCm = (heightPx / dpiY) * 2.54;

          detail.dimensions = `${widthPx} x ${heightPx} px`;
          detail.physical = `${widthCm.toFixed(2)} x ${heightCm.toFixed(2)} cm`;
          detail.dpi = `${dpiX.toFixed(0)} x ${dpiY.toFixed(0)}`;
          detail.status = "Ready";
          renderFileDetails();

          const displayWidth = widthCm * SCALE;
          const displayHeight = heightCm * SCALE;

          const img = new Konva.Image({
            image: imgObj,
            x: 0,
            y: 0,
            width: displayWidth,
            height: displayHeight,
            draggable: true,
            dragBoundFunc: function(pos){
              return clampPosition(this, snapToCm(pos.x), snapToCm(pos.y));
            }
          });

          img.realWidthCm = widthCm;
          img.realHeightCm = heightCm;
          img.fileDetail = detail;

          attachImageInteractions(img);

          imageLayer.add(img);
          imageLayer.draw();

          updateImageCount();
          updateAreaUsage();
        };

        imgObj.src = tempCanvas.toDataURL();
      }catch(error){
        detail.status = "Failed to parse";
        renderFileDetails();
        console.error(error);
      }
    };

    reader.onerror = function(){
      detail.status = "Read error";
      renderFileDetails();
    };

    reader.readAsArrayBuffer(file);
  });
});

/* ================= FUNCTIONS ================= */

function updateImageCount(){
  const images = imageLayer.children.filter(n => n.className === "Image");
  document.getElementById("imageCount").innerText = images.length;
}

function autoLayout(){
  // ส่ง Event ไปยัง Google Analytics (คงไว้ตามที่ตั้งค่ากันไว้)
  if (typeof gtag === 'function') {
    gtag('event', 'use_smart_layout', {
        'event_category': 'production_tool',
        'event_label': 'Smart Auto Layout Clicked'
    });
  }

  const gapCm = parseFloat(document.getElementById("gap").value) || 0;
  const gapPx = gapCm * SCALE; // ใช้ SCALE ปัจจุบัน

  let currentX = 0;
  let currentY = 0;
  let maxRowHeight = 0;

  // ดึงภาพทั้งหมดมาจัดเรียง (เรียงจากภาพที่ใหญ่ที่สุดก่อนเพื่อให้จัดวางง่ายขึ้น)
  const images = imageLayer.children
    .filter(n => n.className === "Image")
    .sort((a, b) => (b.width() * b.height()) - (a.width() * a.height()));

  images.forEach(img => {
    const imgWidth = img.width();
    const imgHeight = img.height();

    // เช็คว่าถ้าขยับไปทางขวาแล้วจะเกินความกว้างของ Stage หรือไม่
    if (currentX + imgWidth > stage.width()) {
      currentX = 0; // กลับไปเริ่มฝั่งซ้าย
      currentY += maxRowHeight + gapPx; // ลงมาบรรทัดใหม่
      maxRowHeight = 0; // รีเซ็ตความสูงแถวใหม่
    }

    // กำหนดตำแหน่งภาพ (Snap ให้ลงตัวเซนติเมตร)
    img.position({
      x: Math.floor(currentX),
      y: Math.floor(currentY)
    });

    // อัปเดตค่าสำหรับภาพถัดไป
    currentX += imgWidth + gapPx;
    maxRowHeight = Math.max(maxRowHeight, imgHeight);
  });

  // ตรวจสอบว่าภาพหลุดขอบล่างหรือไม่ (ถ้าหลุดให้ขยายความสูง Stage อัตโนมัติ - Optional)
  if (currentY + maxRowHeight > stage.height()) {
     console.warn("Warning: Some images are outside the carpet length.");
     document.getElementById("systemStatus").innerText = "OVERFLOW - CHECK LENGTH";
     document.getElementById("systemStatus").style.background = "#e74c3c";
  } else {
     document.getElementById("systemStatus").innerText = "READY";
     document.getElementById("systemStatus").style.background = "#1abc9c";
  }

  imageLayer.draw();
  updateAreaUsage();
}

function exportPDF(){
  if(!stage) return;

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({
    orientation: stage.width() >= stage.height() ? "landscape" : "portrait",
    unit: "pt",
    format: [stage.width(), stage.height()]
  });

  const imageData = stage.toDataURL({ pixelRatio: 2 });
  pdf.addImage(imageData, "PNG", 0, 0, stage.width(), stage.height());
  const profile = getSelectedProfile().toLowerCase();
  pdf.save(`auto-layout-production-${profile}.pdf`);
}

function updateAreaUsage(){

  const widthCm = parseFloat(document.getElementById("width").value) * 100;
  const lengthCm = parseFloat(document.getElementById("length").value) * 100;
  const carpetArea = widthCm * lengthCm;

  let used = 0;

  imageLayer.children.forEach(n=>{
    if(n.className === "Image"){
      used += n.realWidthCm * n.realHeightCm;
    }
  });

  document.getElementById("usedArea").innerText =
    ((used/carpetArea)*100).toFixed(2) + "%";

  document.getElementById("carpetSize").innerText =
    widthCm + " x " + lengthCm + " cm";
}
