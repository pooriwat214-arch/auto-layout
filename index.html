<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>AUTO LAYOUT – Production</title>

<script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.min.js"></script>
<script src="https://unpkg.com/konva@9/konva.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --navy:#2f3136;
  --panel:#3b3d42;
  --panel-line:#4d5158;
  --bg:#5a5a5a;
  --text-light:#f2f4f7;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Segoe UI",Arial,sans-serif;
  background:#3f3f3f;
  display:flex;
  flex-direction:column;
  height:100vh;
}
.topbar{
  background:var(--navy);
  color:white;
  padding:10px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #222427;
  z-index:2;
}
.brand-row{display:flex;align-items:center;gap:16px;}
.brand-title{font-weight:700;letter-spacing:.2px;}
.menu-strip{display:flex;gap:14px;color:#d7d7d7;font-size:13px;}
.menu-strip span{cursor:default;}
.status-badge{
  background:#1abc9c;
  padding:3px 11px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}
.main{
  flex:1;
  min-height:0;
  display:flex;
  overflow:hidden;
}
#controls{
  width:250px;
  background:linear-gradient(180deg,#41454d 0%, #393d44 100%);
  color:#fff;
  border-right:1px solid var(--panel-line);
  padding:14px;
  overflow-y:auto;
  box-shadow:inset -1px 0 0 rgba(255,255,255,0.04);
}
#controls label{
  display:block;
  margin-bottom:6px;
  color:var(--text-light);
  font-size:14px;
  font-weight:600;
}
input{
  width:100%;
  padding:7px 8px;
  margin-bottom:10px;
  border:1px solid #c7ceda;
  border-radius:6px;
  font-size:14px;
}
input:focus{
  outline:none;
  border-color:#6ca0ff;
  box-shadow:0 0 0 2px rgba(108,160,255,0.25);
}
input[type="file"]{
  padding:6px;
  color:#f8fafc;
  background:rgba(255,255,255,0.05);
}
button{
  width:100%;
  padding:9px;
  margin-bottom:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
  transition:filter .15s ease;
}
button:hover{filter:brightness(1.05);}
.btn-primary{background:#24469d;color:white;}
.btn-secondary{background:#e7ebee;color:#1f2937;}
#workspace{
  flex:1;
  min-width:0;
  overflow:auto;
  padding:26px;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  background:#5f5f5f;
}
.canvas-wrapper{
  background:#f4f4f4;
  padding:10px;
  border-radius:2px;
  box-shadow:0 8px 20px rgba(0,0,0,0.28);
  display:inline-block;
}
.editor-wrapper{
  display:grid;
  grid-template-columns:30px 1fr;
  grid-template-rows:30px 1fr;
}
.ruler-corner{grid-column:1;grid-row:1;background:#303030;}
#ruler-top{grid-column:2;grid-row:1;background:#303030;display:block;}
#ruler-left{grid-column:1;grid-row:2;background:#303030;display:block;}
#container{grid-column:2;grid-row:2;}
.file-details{
  margin:4px 0 10px;
  padding:8px;
  border:1px solid rgba(255,255,255,0.16);
  border-radius:6px;
  background:rgba(0,0,0,0.15);
  color:#f3f4f6;
  max-height:170px;
  overflow:auto;
  font-size:11px;
}
.file-item{
  padding:6px 0;
  border-bottom:1px dashed rgba(255,255,255,0.18);
}
.file-item:last-child{border-bottom:none;}
.file-name{
  font-weight:600;
  color:#ffffff;
  margin-bottom:2px;
  word-break:break-word;
}
.file-meta{opacity:.88; line-height:1.3;}
.file-status{
  display:inline-block;
  margin-top:3px;
  padding:1px 6px;
  border-radius:999px;
  font-size:10px;
  background:#1f3c88;
}
.file-details.empty{opacity:.8;}
.footer-info{
  font-size:12px;
  margin-top:12px;
  color:#e5e7eb;
  line-height:1.4;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand-row">
    <div class="brand-title">AUTO LAYOUT – Production System</div>
    <div class="menu-strip">
      <span>File</span><span>Edit</span><span>Object</span><span>View</span><span>Window</span>
    </div>
  </div>
  <div class="status-badge" id="systemStatus">READY</div>
</div>

<div class="main">
  <div id="controls">
    <label>Carpet Width (m)</label>
    <input type="number" id="width" value="4">

    <label>Carpet Length (m)</label>
    <input type="number" id="length" value="40">

    <label>Gap (cm)</label>
    <input type="number" id="gap" value="10">

    <label>Upload Images</label>
    <input type="file" id="upload" multiple>
    <div id="fileDetails" class="file-details empty">No files selected</div>

    <button class="btn-primary" onclick="autoLayout()">Smart Auto Layout</button>
    <button class="btn-primary" onclick="exportPDF()">Export Production PDF</button>
    <button class="btn-secondary" onclick="initStage()">Reset Project</button>

    <div class="footer-info">
      Images: <span id="imageCount">0</span><br>
      Used Area: <span id="usedArea">0%</span><br>
      Carpet Size: <span id="carpetSize">0 x 0 cm</span>
    </div>
  </div>

  <div id="workspace">
    <div class="canvas-wrapper">
      <div class="editor-wrapper">
        <div class="ruler-corner"></div>
        <canvas id="ruler-top"></canvas>
        <canvas id="ruler-left"></canvas>
        <div id="container"></div>
      </div>
    </div>
  </div>
</div>

<script>
let stage, layer;
let SCALE = 1;

window.addEventListener("load", initStage);
window.addEventListener("resize", initStage);
  
const rulerTop = document.getElementById("ruler-top");
const rulerLeft = document.getElementById("ruler-left");
const ctxTop = rulerTop.getContext("2d");
const ctxLeft = rulerLeft.getContext("2d");
const fileDetailsState = [];

function formatFileSize(bytes){
  if(bytes < 1024) return `${bytes} B`;
  if(bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
}

function renderFileDetails(){
  const el = document.getElementById("fileDetails");

  if(!fileDetailsState.length){
    el.classList.add("empty");
    el.innerText = "No files selected";
    return;
  }

  el.classList.remove("empty");
  el.innerHTML = fileDetailsState.map(file => `
    <div class="file-item">
      <div class="file-name">${file.name}</div>
      <div class="file-meta">Type: ${file.type}</div>
      <div class="file-meta">Size: ${formatFileSize(file.size)}</div>
      ${file.dimensions ? `<div class="file-meta">Pixel: ${file.dimensions}</div>` : ""}
      ${file.physical ? `<div class="file-meta">Physical: ${file.physical}</div>` : ""}
      ${file.dpi ? `<div class="file-meta">DPI: ${file.dpi}</div>` : ""}
      <div class="file-status">${file.status}</div>
    </div>
  `).join("");
}

function initRulers(){

  const rulerTop = document.getElementById("ruler-top");
  const rulerLeft = document.getElementById("ruler-left");

  rulerTop.width = stage.width();
  rulerTop.height = 30;

  rulerLeft.width = 30;
  rulerLeft.height = stage.height();

  const ctxTop = rulerTop.getContext("2d");
  const ctxLeft = rulerLeft.getContext("2d");

  ctxTop.fillStyle = "#2b2b2b";
  ctxTop.fillRect(0,0,rulerTop.width,30);

  ctxLeft.fillStyle = "#2b2b2b";
  ctxLeft.fillRect(0,0,30,rulerLeft.height);

  ctxTop.strokeStyle = "#aaa";
  ctxLeft.strokeStyle = "#aaa";

  ctxTop.fillStyle = "#fff";
  ctxLeft.fillStyle = "#fff";

  ctxTop.font = "10px Arial";
  ctxLeft.font = "10px Arial";

  const effectiveScale = SCALE;

  for(let i=0; i<rulerTop.width/effectiveScale; i++){

    const x = i * effectiveScale;

    let tick = 5;
    if(i % 10 === 0) tick = 15;
    else if(i % 5 === 0) tick = 10;

    ctxTop.beginPath();
    ctxTop.moveTo(x,30);
    ctxTop.lineTo(x,30-tick);
    ctxTop.stroke();

    if(i % 10 === 0){
      ctxTop.fillText(i, x+2, 10);
    }
  }

  for(let i=0; i<rulerLeft.height/effectiveScale; i++){

    const y = i * effectiveScale;

    let tick = 5;
    if(i % 10 === 0) tick = 15;
    else if(i % 5 === 0) tick = 10;

    ctxLeft.beginPath();
    ctxLeft.moveTo(30,y);
    ctxLeft.lineTo(30-tick,y);
    ctxLeft.stroke();

    if(i % 10 === 0){
      ctxLeft.save();
      ctxLeft.translate(2,y+3);
      ctxLeft.rotate(-Math.PI/2);
      ctxLeft.fillText(i,0,0);
      ctxLeft.restore();
    }
  }
}

function drawRulers(){

  ctxTop.clearRect(0,0,rulerTop.width,rulerTop.height);
  ctxLeft.clearRect(0,0,rulerLeft.width,rulerLeft.height);

  ctxTop.fillStyle = "#2b2b2b";
  ctxTop.fillRect(0,0,rulerTop.width,rulerTop.height);

  ctxLeft.fillStyle = "#2b2b2b";
  ctxLeft.fillRect(0,0,rulerLeft.width,rulerLeft.height);

  ctxTop.strokeStyle = "#aaa";
  ctxLeft.strokeStyle = "#aaa";

  ctxTop.fillStyle = "#fff";
  ctxLeft.fillStyle = "#fff";

  ctxTop.font = "10px Arial";
  ctxLeft.font = "10px Arial";

  for(let i=0; i<rulerTop.width/SCALE; i++){
    const x = i * SCALE;
    let tickHeight = 5;

    if(i % 10 === 0) tickHeight = 15;
    else if(i % 5 === 0) tickHeight = 10;

    ctxTop.beginPath();
    ctxTop.moveTo(x,30);
    ctxTop.lineTo(x,30-tickHeight);
    ctxTop.stroke();

    if(i % 10 === 0){
      ctxTop.fillText(i, x+2, 10);
    }
  }

  for(let i=0; i<rulerLeft.height/SCALE; i++){
    const y = i * SCALE;
    let tickWidth = 5;

    if(i % 10 === 0) tickWidth = 15;
    else if(i % 5 === 0) tickWidth = 10;

    ctxLeft.beginPath();
    ctxLeft.moveTo(30, y);
    ctxLeft.lineTo(30-tickWidth, y);
    ctxLeft.stroke();

    if(i % 10 === 0){
      ctxLeft.save();
      ctxLeft.translate(2, y+3);
      ctxLeft.rotate(-Math.PI/2);
      ctxLeft.fillText(i, 0, 0);
      ctxLeft.restore();
    }
  }
}

/* ================= RESPONSIVE SCALE ================= */

function getResponsiveScale(){

  const widthCm = parseFloat(document.getElementById("width").value) * 100;
  const workspace = document.getElementById("workspace");

  const maxWidth = workspace.clientWidth - 100;

  return maxWidth / widthCm;
}

/* ================= INIT STAGE ================= */

function initStage(){

  const widthCm = parseFloat(document.getElementById("width").value) * 100;
  const lengthCm = parseFloat(document.getElementById("length").value) * 100;

  SCALE = getResponsiveScale();

  const widthPx = widthCm * SCALE;
  const heightPx = lengthCm * SCALE;

  const container = document.getElementById("container");
  container.innerHTML = "";

  stage = new Konva.Stage({
    container: "container",
    width: widthPx,
    height: heightPx
  });

  layer = new Konva.Layer();
  stage.add(layer);

  const carpet = new Konva.Rect({
    x: 0,
    y: 0,
    width: widthPx,
    height: heightPx,
    fill: "#ffffff",
    stroke: "black",
    strokeWidth: 2
  });

  layer.add(carpet);
  layer.draw();

  initRulers();
  updateAreaUsage();
}

/* ================= UPLOAD TIFF ================= */

document.getElementById("upload").addEventListener("change", function(e){

  const selectedFiles = Array.from(e.target.files);
  fileDetailsState.length = 0;

  if(!selectedFiles.length){
    renderFileDetails();
    return;
  }

  selectedFiles.forEach(file=>{

    const detail = {
      name: file.name,
      type: file.type || "unknown",
      size: file.size,
      status: "Loading..."
    };

    fileDetailsState.push(detail);
    renderFileDetails();

    const reader = new FileReader();

    reader.onload = function(evt){
      try{
        const buffer = evt.target.result;
        const ifds = UTIF.decode(buffer);
        const page = ifds[0];

        UTIF.decodeImage(buffer, page);

        const widthPx = page.width;
        const heightPx = page.height;
        const rgba = UTIF.toRGBA8(page);

        const tempCanvas = document.createElement("canvas");
        tempCanvas.width = widthPx;
        tempCanvas.height = heightPx;

        const ctx = tempCanvas.getContext("2d");
        const imgData = ctx.createImageData(widthPx, heightPx);
        imgData.data.set(rgba);
        ctx.putImageData(imgData, 0, 0);

        const imgObj = new Image();

        imgObj.onload = function(){
          let dpiX = 300;
          let dpiY = 300;

          if(page["XResolution"] && page["YResolution"]){
            dpiX = page["XResolution"][0] / page["XResolution"][1];
            dpiY = page["YResolution"][0] / page["YResolution"][1];
          }

          const widthCm = (widthPx / dpiX) * 2.54;
          const heightCm = (heightPx / dpiY) * 2.54;

          detail.dimensions = `${widthPx} x ${heightPx} px`;
          detail.physical = `${widthCm.toFixed(2)} x ${heightCm.toFixed(2)} cm`;
          detail.dpi = `${dpiX.toFixed(0)} x ${dpiY.toFixed(0)}`;
          detail.status = "Ready";
          renderFileDetails();

          const displayWidth = widthCm * SCALE;
          const displayHeight = heightCm * SCALE;

          const img = new Konva.Image({
            image: imgObj,
            x: 0,
            y: 0,
            width: displayWidth,
            height: displayHeight,
            draggable: true
          });

          img.realWidthCm = widthCm;
          img.realHeightCm = heightCm;

          layer.add(img);
          layer.draw();

          updateImageCount();
          updateAreaUsage();
        };

        imgObj.src = tempCanvas.toDataURL();
      }catch(error){
        detail.status = "Failed to parse";
        renderFileDetails();
        console.error(error);
      }
    };

    reader.onerror = function(){
      detail.status = "Read error";
      renderFileDetails();
    };

    reader.readAsArrayBuffer(file);
  });
});

/* ================= FUNCTIONS ================= */

function updateImageCount(){
  const images = layer.children.filter(n => n.className === "Image");
  document.getElementById("imageCount").innerText = images.length;
}

function autoLayout(){

  const gapCm = parseFloat(document.getElementById("gap").value);
  const gapPx = gapCm * SCALE;

  let x = 0, y = 0, rowHeight = 0;

  const images = layer.children
    .filter(n => n.className === "Image")
    .sort((a,b)=>(b.width()*b.height())-(a.width()*a.height()));

  images.forEach(img => {

    if(x + img.width() > stage.width()){
      x = 0;
      y += rowHeight + gapPx;
      rowHeight = 0;
    }

    img.position({x,y});
    x += img.width() + gapPx;
    rowHeight = Math.max(rowHeight, img.height());
  });

  layer.draw();
  updateAreaUsage();
}

function exportPDF(){
  if(!stage) return;

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({
    orientation: stage.width() >= stage.height() ? "landscape" : "portrait",
    unit: "pt",
    format: [stage.width(), stage.height()]
  });

  const imageData = stage.toDataURL({ pixelRatio: 2 });
  pdf.addImage(imageData, "PNG", 0, 0, stage.width(), stage.height());
  pdf.save("auto-layout-production.pdf");
}

function updateAreaUsage(){

  const widthCm = parseFloat(document.getElementById("width").value) * 100;
  const lengthCm = parseFloat(document.getElementById("length").value) * 100;
  const carpetArea = widthCm * lengthCm;

  let used = 0;

  layer.children.forEach(n=>{
    if(n.className === "Image"){
      used += n.realWidthCm * n.realHeightCm;
    }
  });

  document.getElementById("usedArea").innerText =
    ((used/carpetArea)*100).toFixed(2) + "%";

  document.getElementById("carpetSize").innerText =
    widthCm + " x " + lengthCm + " cm";
}
</script>
</body>
</html>
